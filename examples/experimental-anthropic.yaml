name: experimental-anthropic-demo
provider:
  kind: anthropic-messages
  model: claude-3-5-sonnet-latest
  options:
    apiKeyEnv: ANTHROPIC_API_KEY
memory:
  kind: file
  options:
    filePath: artifacts/experimental-anthropic-memory.json
policy:
  maxTasksPerRun: 2
  humanApprovalRequired: true
  allowSkillFallback: true
agents:
  - id: manager
    role: Research Manager
    department: research
    skills:
      - task-classifier
    instruction: Coordinate work and package findings.
  - id: worker
    role: Research Worker
    department: research
    skills:
      - web-research-stub
    instruction: Produce a compact research brief.
departments:
  - id: research
    label: Research Department
    manager: manager
    workers:
      - worker
    routingStrategy: broadcast
tasks:
  - id: anthropic-provider-smoke
    title: Produce a short note on auditable multi-agent runtimes
    ownerDepartment: research
    desiredOutput: Short markdown brief
    requiredSkills:
      - web-research-stub
    checkpoint: Human review before publication
